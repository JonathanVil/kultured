{{define "content"}}
<section>
    <h2>Active batches</h2>
    {{if .}}
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Tea type</th>
                    <th>Stage</th>
                    <th>Started</th>
                </tr>
            </thead>
            <tbody>
                {{range .}}
                <tr>
                    <td>{{.Name}}</td>
                    <td>{{.TeaType}}</td>
                    <td>{{.Stage}}</td>
                    <td>{{.StartedAt}}</td>
                    <td>
                        <button hx-delete="/batches/{{.ID}}"
                                hx-target="closest tr"
                                hx-swap="outerHTML"
                                hx-confirm="Delete this batch?"
                                class="secondary">
                            Delete
                        </button>
                    </td>
                </tr>
                {{end}}
            </tbody>
        </table>
    {{else}}
        <p>No batches yet. Time to brew something.</p>
    {{end}}
    <a href="/batches/new" role="button">New batch</a>
</section>
{{end}}
