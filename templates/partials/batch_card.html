{{define "batch_card"}}
<article>
    <header>
        <a href="/batches/{{.ID}}"><strong>{{.Name}}</strong></a>
        <small>{{.Stage}}</small>
    </header>
    <p>{{.TeaType}} · {{.VolumeL}}L · Started {{.StartedAt}} · {{.DaysElapsed}} days elapsed</p>
    {{if .HasGravity}}<p>Latest gravity: {{printf "%.3f" .LatestGravity}}</p>{{end}}
    <footer>
        <button hx-delete="/batches/{{.ID}}"
                hx-target="closest article"
                hx-swap="outerHTML"
                hx-confirm="Delete this batch?"
                class="secondary outline">
            Delete
        </button>
    </footer>
</article>
{{end}}
